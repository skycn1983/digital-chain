version: '3.8'

services:
  # Digital Chain 节点 1 (种子节点)
  node1:
    image: digitalchain/node:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dc-node1
    ports:
      - "3000:3000"    # REST API
      - "30001:30001"  # P2P
    environment:
      - PORT=3000
      - P2P_PORT=30001
      - NODE_ID_SEED=node1-testnet
      - DATA_DIR=/data
      - SEED_NODES=node1:30001
    volumes:
      - node1-data:/data
    networks:
      - digitalchain-testnet
    command: ["node", "src/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Digital Chain 节点 2
  node2:
    image: digitalchain/node:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dc-node2
    ports:
      - "3002:3002"    # REST API
      - "30003:30003"  # P2P
    environment:
      - PORT=3002
      - P2P_PORT=30003
      - NODE_ID_SEED=node2-testnet
      - DATA_DIR=/data
      - SEED_NODES=node1:30001
    volumes:
      - node2-data:/data
    networks:
      - digitalchain-testnet
    depends_on:
      node1:
        condition: service_healthy
    command: ["node", "src/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Digital Chain 节点 3
  node3:
    image: digitalchain/node:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dc-node3
    ports:
      - "3004:3004"    # REST API
      - "30005:30005"  # P2P
    environment:
      - PORT=3004
      - P2P_PORT=30005
      - NODE_ID_SEED=node3-testnet
      - DATA_DIR=/data
      - SEED_NODES=node1:30001
    volumes:
      - node3-data:/data
    networks:
      - digitalchain-testnet
    depends_on:
      node1:
        condition: service_healthy
    command: ["node", "src/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 水龙头服务
  faucet:
    image: digitalchain/faucet:latest
    build:
      context: ./faucet
      dockerfile: Dockerfile
    container_name: dc-faucet
    ports:
      - "8081:8081"
    environment:
      - NODE_URL=http://node1:3000
      - FAUCET_ADDRESS=${FAUCET_ADDRESS}
      - FAUCET_KEY=${FAUCET_KEY}
    networks:
      - digitalchain-testnet
    depends_on:
      - node1
    restart: unless-stopped

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: dc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - digitalchain-testnet
    depends_on:
      - node1
      - node2
      - node3
      - faucet
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  digitalchain-testnet:
    driver: bridge
