<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Chain - 代币转账</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔗 Digital Chain</h1>
      <p class="subtitle">去中心化代币转账</p>
      <div class="connection-status">
        <span id="status-dot" class="dot disconnected"></span>
        <span id="status-text">未连接</span>
      </div>
    </header>

    <main>
      <!-- 钱包面板 -->
      <section class="panel wallet-panel">
        <h2>👛 钱包</h2>
        <div class="wallet-info" id="wallet-info" style="display: none;">
          <div class="info-row">
            <label>地址:</label>
            <code id="wallet-address" class="address"></code>
            <button class="btn-small" onclick="copyAddress()">📋</button>
          </div>
          <div class="info-row">
            <label>余额:</label>
            <span id="wallet-balance" class="balance">0</span>
            <span class="unit">OCT</span>
          </div>
          <div class="info-row">
            <label>Nonce:</label>
            <span id="wallet-nonce">0</span>
          </div>
        </div>
        <div class="wallet-actions" id="wallet-actions">
          <button class="btn primary" onclick="createWallet()">🆕 创建新钱包</button>
          <button class="btn" onclick="importWallet()">📥 导入钱包</button>
        </div>
        <div class="private-key-warning" id="private-key-warning" style="display: none;">
          ⚠️ <strong>重要</strong>: 请保存私钥！刷新页面将丢失。
          <div class="private-key-box">
            <code id="private-key"></code>
            <button class="btn-small" onclick="copyPrivateKey()">📋</button>
          </div>
        </div>
      </section>

      <!-- 转账面板 -->
      <section class="panel transfer-panel" id="transfer-panel" style="display: none;">
        <h2>💸 发送交易</h2>
        <form id="transfer-form" onsubmit="sendTransaction(event)">
          <div class="form-group">
            <label for="to-address">接收地址</label>
            <input type="text" id="to-address" placeholder="0x..." required>
          </div>
          <div class="form-group">
            <label for="amount">金额 (OCT)</label>
            <input type="number" id="amount" min="1" step="1" required>
          </div>
          <div class="form-group">
            <label for="gas-price">Gas Price</label>
            <input type="number" id="gas-price" value="1" min="1" required>
          </div>
          <div class="form-group">
            <label for="gas-limit">Gas Limit</label>
            <input type="number" id="gas-limit" value="21000" min="21000" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary" id="send-btn">📤 发送交易</button>
            <button type="button" class="btn" onclick="mineBlock()">⛏️ 挖矿</button>
          </div>
        </form>
        <div class="tx-result" id="tx-result" style="display: none;"></div>
      </section>

      <!-- 交易池面板 -->
      <section class="panel pending-panel">
        <h2>⏳ 待处理交易</h2>
        <div id="pending-count" class="count-badge">0</div>
        <div class="tx-list" id="pending-list"></div>
      </section>

      <!-- 链状态面板 -->
      <section class="panel chain-panel">
        <h2>⛓️ 链状态</h2>
        <div class="chain-stats">
          <div class="stat">
            <span class="label">区块高度</span>
            <span id="chain-height" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">难度</span>
            <span id="chain-difficulty" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">出块奖励</span>
            <span id="chain-reward" class="value">-</span>
          </div>
          <div class="stat">
            <span class="label">链状态</span>
            <span id="chain-valid" class="value">-</span>
          </div>
        </div>
        <div class="latest-block" id="latest-block"></div>
      </section>

      <!-- 最近区块 -->
      <section class="panel blocks-panel">
        <h2>📦 最近区块</h2>
        <div class="block-list" id="block-list"></div>
      </section>
    </main>

    <footer>
      <p>Digital Chain v1.1.0 | <a href="https://github.com/skycn1983/digital-chain" target="_blank">GitHub</a></p>
      <p>基于 OpenClaw AI Agent 构建</p>
    </footer>
  </div>

  <!-- 钱包导入模态框 -->
  <div id="import-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close" onclick="closeImportModal()">&times;</span>
      <h2>📥 导入钱包</h2>
      <p>请输入私钥（WIF格式或十六进制）</p>
      <textarea id="import-private-key" placeholder="私钥..."></textarea>
      <button class="btn primary" onclick="confirmImport()">导入</button>
    </div>
  </div>

  <!-- 通知 Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
